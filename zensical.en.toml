[project]
site_name    = "ATBCmder"
site_url     = "https://cmder.aitobox.com/en/"
site_description = "The Dual-Panel File Manager for macOS"
repo_url     = "https://github.com/aitobox/ATBCmderDoc"
repo_name    = "ATBCmderDoc"
docs_dir     = "docs/en"
site_dir     = "site/en"

nav = [
  { "Welcome to ATBCmder" = "index.md" },
  { "Getting Started with ATBCmder" = "getting_started.md" },
  { "Navigation Guide" = "navigation.md" },
  { "File Management Guide" = "file_management.md" },
  { "Advanced Features (For Power Users)" = "advanced_features.md" },
  { "How-To Guides & FAQ" = "faq_howtos.md" },
  { "Privacy Policy" = "privacy_policy.md" }
]

[project.theme]
name        = "material"
custom_dir  = "overrides"
palette     = [
  { scheme = "default", primary = "indigo", accent = "deep-purple", media = "(prefers-color-scheme: light)" },
  { scheme = "slate",   primary = "indigo", accent = "deep-purple", media = "(prefers-color-scheme: dark)" }
]
font        = { text = "Roboto", code = "Roboto Mono" }
features    = [
  "navigation.top",
  "search.highlight",
  "content.code.copy"
]

[project.extra]
app_store_url = "https://apps.apple.com/app/atbcmder/6792398333"

[project.extra_css]
files = ["stylesheets/extra.css"]
